# Server Configuration
server.port=${PORT:8080}

spring.profiles.include=${SPRING_EXTRA_PROFILES:local}

# Database - degerler ortam degiskeninden gelir (lokalde application-local.properties doldurur)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/portfolio}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# SMTP engelli ortamlarda istek asili kalmasin
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Iletisim formu alicisi
app.contact.recipient=${CONTACT_RECIPIENT:burakeroksuz@gmail.com}

# Resend (HTTP e-posta API) - doluysa SMTP yerine bu kullanilir.
# Railway free plan SMTP portlarini engelledigi icin canlida sart.
app.resend.api-key=${RESEND_API_KEY:}
# Domain dogrulaninca RESEND_FROM env ile "Burak <contact@iamburak.dev>" yapilir
app.resend.from=${RESEND_FROM:Portfolio <onboarding@resend.dev>}

# Admin (yazma uclari icin X-Admin-Key header'i)
admin.api-key=${ADMIN_API_KEY:}

# CORS - canlida Vercel domain'i eklenecek (virgullu liste)
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Logging
logging.level.org.springframework.web=INFO
logging.level.Portfolio.backend=DEBUG
