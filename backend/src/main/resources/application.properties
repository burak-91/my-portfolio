# Server Configuration
server.port=${PORT:8080}

spring.profiles.include=${SPRING_EXTRA_PROFILES:local}

# Database - degerler ortam degiskeninden gelir (lokalde application-local.properties doldurur)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/portfolio}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Iletisim formu alicisi
app.contact.recipient=${CONTACT_RECIPIENT:burakeroksuz@gmail.com}

# Admin (yazma uclari icin X-Admin-Key header'i)
admin.api-key=${ADMIN_API_KEY:}

# CORS - canlida Vercel domain'i eklenecek (virgullu liste)
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Logging
logging.level.org.springframework.web=INFO
logging.level.Portfolio.backend=DEBUG
